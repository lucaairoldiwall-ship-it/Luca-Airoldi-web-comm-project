#  The M.A.L.L.S.
### A Punk Rock Band Website  
#### Luca Airoldi

---

# Overview

**The M.A.L.L.S.** is a web project designed to promote a punk rock band online.

### Users can:
- Discover the band and its members
- Explore upcoming live shows
- Interact with the band

![Home Page](img/Screenshot.navbar.png)

---

# Project Idea

### Goal:
Create a simple but engaging platform that helps a band:

- Gain visibility  
- Present their identity  
- Connect with fans

---

# Tech Stack

- **Static Site Generator:** GetNikola  
- **Frontend:** HTML, CSS, JavaScript  
- **Features:** Cookies, Mailto form  

![Home Page](img/Screenshot.nikola.png)

---

# Design

-  Dark theme  
-  Purple accents  
-  Punk rock aesthetic  

![Home Page](img/Screenshot.main.page.png)

---

# Members Page

- Band presentation  
- Member images  
- Roles and descriptions  

![Home Page](img/Screenshot.members.png)

---

# Live Page

Displays upcoming concerts:

- Date  
- Venue  
- City  

![Home Page](img/Screenshot.live.png)

---

# Cookies

Used to store user preferences:

- Name  
- Favorite section  

![Home Page](img/Screenshot.cookies.png)

---

# Contact Form

- Collects user input  
- Generates an email via `mailto`

![Home Page](img/Screenshot.contacts.png)

---

# Features

- Simple and clean structure  
- Interactive elements (JavaScript)  
- User personalization (cookies)  
- Easy deployment (static site)
